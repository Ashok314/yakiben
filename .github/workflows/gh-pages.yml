name: Deploy App

on:
  push:
    branches: [develop, fix-local-setup]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Yarn
        run: corepack enable && corepack prepare yarn@4.9.1 --activate

      - name: Install dependencies
        run: yarn install

      # 1. Backend Deployment (Apps Script)
      - name: Prepare Clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          echo "$CLASPRC_JSON" > /home/runner/.clasprc.json
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}","rootDir":"./dist"}' > apps/api/.clasp.json

      - name: Build and Deploy API
        id: deploy_api
        run: |
          yarn workspace api build
          ./apps/api/scripts/smart-deploy.sh

      # 2. Frontend Build (using the ID discovered by the script)
      - name: Build Apps
        env:
          VITE_API_URL: ${{ steps.deploy_api.outputs.api_url }}
        run: |
          yarn workspace customer build
          yarn workspace admin build

      - name: Prepare GitHub Pages
        run: |
          rm -rf customer admin
          mv apps/customer/dist customer
          mv apps/admin/dist admin

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
          destination_dir: ./
          enable_jekyll: false