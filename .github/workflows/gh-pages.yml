name: Deploy to GitHub Pages

on:
  push:
    branches: [develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Yarn 4 (Berry)
        run: corepack enable && corepack prepare yarn@4.9.1 --activate

      - name: Install dependencies
        run: yarn install

      - name: Build customer app
        run: yarn workspace customer build

      - name: Build admin app
        run: yarn workspace admin build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
          destination_dir: ./
          enable_jekyll: false

      - name: Copy dist folders to root for GitHub Pages
        run: |
          rm -rf customer admin
          mv apps/customer/dist customer
          mv apps/admin/dist admin

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./